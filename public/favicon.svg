  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="white"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#bgGrad)" stroke-width="3"/>
  
  <!-- L Letter (Blue gradient) -->
