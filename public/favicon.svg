  <rect x="72" y="90" width="4" height="23" fill="#60a5fa" opacity="0.8"/>
  
  <!-- S Letter (Silver/Gray) -->
  <path d="M 110 70 Q 95 70 95 80 Q 95 90 110 90 L 130 90 Q 145 90 145 100 Q 145 110 130 110 L 110 110 Q 100 110 100 115 L 100 120 Q 100 130 110 130 L 135 130 Q 150 130 150 115 Q 150 100 135 100 L 115 100 Q 100 100 100 85 Q 100 70 115 70 L 135 70 Q 145 70 145 75 L 145 80 Q 145 85 140 85 L 115 85 Q 110 85 110 80 Z" fill="#94a3b8"/>
  
  <!-- Code brackets </> -->
